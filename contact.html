<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | HomeFresher</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="images/homefresher_house.svg">
</head>
<body>

<header class="site-header">
  <div class="logo">
    <a href="index.html">
      <img src="images/homefresher_logo_horizontal.svg" alt="HomeFresher Logo">
    </a>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="process.html">Our Process</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>

  <section class="page-hero">
    <div class="narrow-container">
      <h1>Request a quote.</h1>
      <p>
        Tell us about the unit and we’ll follow up with pricing and availability.
      </p>
    </div>
  </section>

  <section class="section">
    <div class="narrow-container">

      <form class="contact-form" action="#" method="POST">

        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required>
          </div>

          <div class="form-group">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="beds">Bedrooms</label>
            <select id="beds" name="beds">
              <option value="">Select</option>
              <option>1 bedroom</option>
              <option>2 bedrooms</option>
              <option>3 bedrooms</option>
              <option>4+ bedrooms</option>
            </select>
          </div>

          <div class="form-group">
            <label for="baths">Bathrooms</label>
            <select id="baths" name="baths">
              <option value="">Select</option>
              <option>1 bathroom</option>
              <option>2 bathrooms</option>
              <option>3+ bathrooms</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="address">Property address / unit</label>
          <input id="address" name="address" type="text">
        </div>

        <div class="form-group">
          <label for="message">Tell us about the clean</label>
          <textarea id="message" name="message" rows="6" placeholder="Approximate square footage, condition, preferred date, add-ons, or anything else helpful."></textarea>
        </div>

        <button class="button" type="submit">Submit Request</button>

      </form>

    </div>
  </section>

</main>

<footer>
  <p>© 2026 HomeFresher. All rights reserved.</p>
</footer>

</body>
</html>
